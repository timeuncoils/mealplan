<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">

<style>
:root{
  --bg:#0b0b0c;
  --text:#e9e9ea;
  --muted:#6e6e73;
  --line:#1a1a1d;
  --accent:#ff453a;
}
*{box-sizing:border-box}
body{
  margin:0;
  background:var(--bg);
  color:var(--text);
  font-family:-apple-system,BlinkMacSystemFont,system-ui,sans-serif;
  -webkit-font-smoothing:antialiased;
}
.wrapper{
  max-width:720px;
  margin:0 auto;
  padding:
    calc(env(safe-area-inset-top) + 64px)
    28px
    calc(env(safe-area-inset-bottom) + 60px);
}
.header{
  font-size:14px;
  letter-spacing:.15em;
  text-transform:uppercase;
  color:var(--accent);
  margin-bottom:72px;
}
.note{
  padding:28px 0;
  border-bottom:1px solid var(--line);
}
.note:last-child{border-bottom:none}
.note-text{
  font-size:20px;
  line-height:1.55;
}
.note-meta{
  margin-top:10px;
  font-size:12px;
  color:var(--muted);
  letter-spacing:.06em;
}
.composer{
  margin-top:80px;
  border-top:1px solid var(--line);
  padding-top:36px;
}
textarea{
  width:100%;
  border:none;
  background:transparent;
  resize:none;
  font-size:22px;
  line-height:1.4;
  outline:none;
  color:var(--text);
}
textarea::placeholder{color:var(--muted)}
.actions{
  margin-top:18px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}
.hint{
  font-size:12px;
  color:var(--muted);
}
.save{
  font-size:14px;
  text-transform:uppercase;
  letter-spacing:.12em;
  color:var(--accent);
  background:none;
  border:none;
  cursor:pointer;
}
.empty{
  font-size:18px;
  color:var(--muted);
  padding:40px 0;
}
</style>
</head>
<body>

<div class="wrapper">
  <div class="header">Noted</div>
  <div id="notes"></div>

  <div class="composer">
    <textarea id="input" rows="1" placeholder="Write something..."></textarea>
    <div class="actions">
      <div class="hint">Ctrl + Enter to save</div>
      <button class="save" id="saveBtn">Save</button>
    </div>
  </div>
</div>

<script>
const OWNER="timeuncoils",
      REPO="noted",
      DIR="notes";

const notesEl=document.getElementById("notes"),
      input=document.getElementById("input"),
      saveBtn=document.getElementById("saveBtn");

let TOKEN=localStorage.getItem("noted_token")||"";
if(!TOKEN){
  TOKEN=prompt("GitHub Token:");
  if(TOKEN) localStorage.setItem("noted_token",TOKEN);
}

const headers={
  "Authorization":`token ${TOKEN}`,
  "Accept":"application/vnd.github.v3+json"
};

const encode=s=>btoa(unescape(encodeURIComponent(s)));

async function saveNote(){
  const text=input.value.trim();
  if(!text) return;

  input.value="";
  autoGrow();

  const id=Date.now(),
        created=new Date().toISOString(),
        filename=`${DIR}/${id}.md`;

  const content=`created: ${created}
id: ${id}

${text}
`;

  await fetch(
    `https://api.github.com/repos/${OWNER}/${REPO}/contents/${filename}`,
    {
      method:"PUT",
      headers:{...headers,"Content-Type":"application/json"},
      body:JSON.stringify({
        message:`Add note ${id}`,
        content:encode(content)
      })
    }
  );

  loadNotes();
}

async function loadNotes(){
  try{
    const res=await fetch(
      `https://api.github.com/repos/${OWNER}/${REPO}/contents/${DIR}`,
      {headers}
    );

    if(res.status===404){
      notesEl.innerHTML="<div class='empty'>No notes yet</div>";
      return;
    }

    const files=(await res.json())
      .filter(f=>f.name.endsWith(".md"))
      .sort((a,b)=>b.name.localeCompare(a.name));

    const loaded=await Promise.all(
      files.map(async f=>{
        const t=await fetch(f.download_url).then(r=>r.text());
        const created=(/created:\s*(.+)/.exec(t)||[])[1]||"";
        const body=t.split("\n\n").slice(1).join("\n").trim();
        return {created,text:body};
      })
    );

    render(loaded);

  }catch{
    notesEl.innerHTML="<div class='empty'>Load failed</div>";
  }
}

function render(data){
  if(!data.length){
    notesEl.innerHTML="<div class='empty'>No notes yet</div>";
    return;
  }

  notesEl.innerHTML=data.map(n=>`
    <div class="note">
      <div class="note-text">${escape(n.text)}</div>
      <div class="note-meta">${new Date(n.created).toLocaleString()}</div>
    </div>
  `).join("");
}

const escape=s=>s
  .replace(/&/g,"&amp;")
  .replace(/</g,"&lt;")
  .replace(/>/g,"&gt;");

function autoGrow(){
  input.style.height="auto";
  input.style.height=input.scrollHeight+"px";
}

input.addEventListener("input",autoGrow);
input.addEventListener("keydown",e=>{
  if((e.ctrlKey||e.metaKey)&&e.key==="Enter") saveNote();
});
saveBtn.onclick=saveNote;

loadNotes();
</script>

</body>
</html>
