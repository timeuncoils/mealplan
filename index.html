<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">

<style>
:root{
  --bg:#0b0b0c;
  --text:#e9e9ea;
  --muted:#6e6e73;
  --line:#1a1a1d;
  --accent:#ff453a;
}

*{box-sizing:border-box}

body{
  margin:0;
  background:var(--bg);
  color:var(--text);
  font-family:-apple-system,BlinkMacSystemFont,system-ui,sans-serif;
  -webkit-font-smoothing:antialiased;
}

.wrapper{
  max-width:720px;
  margin:0 auto;
  padding:
    calc(env(safe-area-inset-top) + 64px)
    28px
    calc(env(safe-area-inset-bottom) + 60px);
}

.header{
  font-size:14px;
  letter-spacing:0.15em;
  text-transform:uppercase;
  color:var(--accent);
  margin-bottom:72px;
}

/* Notes */

.note{
  padding:28px 0;
  border-bottom:1px solid var(--line);
  animation:fade .3s ease both;
}

.note:last-child{
  border-bottom:none;
}

.note-text{
  font-size:20px;
  line-height:1.55;
  font-weight:400;
}

.note-meta{
  margin-top:10px;
  font-size:12px;
  color:var(--muted);
  letter-spacing:0.06em;
}

@keyframes fade{
  from{opacity:0; transform:translateY(6px)}
  to{opacity:1; transform:translateY(0)}
}

/* Composer */

.composer{
  margin-top:80px;
  border-top:1px solid var(--line);
  padding-top:36px;
}

textarea{
  width:100%;
  border:none;
  background:transparent;
  resize:none;
  font-size:22px;
  line-height:1.4;
  outline:none;
  color:var(--text);
}

textarea::placeholder{
  color:var(--muted);
}

.actions{
  margin-top:18px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.hint{
  font-size:12px;
  color:var(--muted);
}

.save{
  font-size:14px;
  text-transform:uppercase;
  letter-spacing:0.12em;
  color:var(--accent);
  background:none;
  border:none;
  padding:0;
  cursor:pointer;
}

.save:active{
  opacity:0.6;
}

.empty{
  font-size:18px;
  color:var(--muted);
  padding:40px 0;
}
</style>
</head>
<body>

<div class="wrapper">

  <div class="header">Noted</div>

  <div id="notes"></div>

  <div class="composer">
    <textarea id="input" rows="1" placeholder="Write something..."></textarea>

    <div class="actions">
      <div class="hint">Ctrl + Enter to save</div>
      <button class="save" onclick="saveNote()">Save</button>
    </div>
  </div>

</div>

<script>
const OWNER = "timeuncoils";
const REPO  = "noted";
const DIR   = "notes";

let TOKEN = localStorage.getItem("noted_token") || "";

if(!TOKEN){
  TOKEN = prompt("GitHub Token:");
  if(TOKEN) localStorage.setItem("noted_token", TOKEN);
}

const headers = () => ({
  "Authorization": `token ${TOKEN}`,
  "Accept": "application/vnd.github.v3+json"
});

const encode = s => btoa(unescape(encodeURIComponent(s)));

async function saveNote(){
  const input = document.getElementById("input");
  const text = input.value.trim();
  if(!text) return;

  input.value="";
  autoGrow(input);

  const id = Date.now();
  const filename = `${DIR}/${id}.md`;
  const created = new Date().toISOString();

  const content =
`created: ${created}
id: ${id}

${text}
`;

  await fetch(
    `https://api.github.com/repos/${OWNER}/${REPO}/contents/${filename}`,
    {
      method:"PUT",
      headers:{...headers(),"Content-Type":"application/json"},
      body:JSON.stringify({
        message:`Add note ${id}`,
        content:encode(content)
      })
    }
  );

  loadNotes();
}

async function loadNotes(){
  try{
    const res = await fetch(
      `https://api.github.com/repos/${OWNER}/${REPO}/contents/${DIR}`,
      { headers: headers() }
    );

    if(res.status===404){
      document.getElementById("notes").innerHTML =
        "<div class='empty'>No notes yet</div>";
      return;
    }

    const files = await res.json();
    const mdFiles = files.filter(f=>f.name.endsWith(".md"));

    const loaded = await Promise.all(
      mdFiles.map(async f=>{
        const r = await fetch(f.download_url);
        const text = await r.text();
        const id = parseInt(text.match(/id:\s*(\d+)/)?.[1]||0);
        const created = text.match(/created:\s*(.+)/)?.[1]||"";
        const body = text.split("\n\n").slice(1).join("\n").trim();
        return {id,created,text:body};
      })
    );

    loaded.sort((a,b)=>b.id-a.id);
    render(loaded);

  }catch{
    document.getElementById("notes").innerHTML =
      "<div class='empty'>Load failed</div>";
  }
}

function render(notes){
  const container = document.getElementById("notes");
  container.innerHTML="";

  if(!notes.length){
    container.innerHTML =
      "<div class='empty'>No notes yet</div>";
    return;
  }

  notes.forEach(n=>{
    const div=document.createElement("div");
    div.className="note";
    div.innerHTML=`
      <div class="note-text">${escapeHtml(n.text)}</div>
      <div class="note-meta">${new Date(n.created).toLocaleString()}</div>
    `;
    container.appendChild(div);
  });
}

function escapeHtml(str){
  return str
    .replace(/&/g,"&amp;")
    .replace(/</g,"&lt;")
    .replace(/>/g,"&gt;");
}

/* Auto-grow textarea */
const textarea=document.getElementById("input");
textarea.addEventListener("input",()=>autoGrow(textarea));

function autoGrow(el){
  el.style.height="auto";
  el.style.height=el.scrollHeight+"px";
}

/* Ctrl + Enter Save */
textarea.addEventListener("keydown", e=>{
  if((e.ctrlKey || e.metaKey) && e.key==="Enter"){
    saveNote();
  }
});

loadNotes();
</script>

</body>
</html>
